# Deploy the Lottery Odds Simulator as a static Shinylive (webR) site to
# GitHub Pages. The full test suite gates the export; the data cache is
# prebuilt so the browser never parses the raw CSVs.
#
# NOTE: the fable_ branch trigger is temporary, for pre-merge verification of
# this workflow; it is removed when the branch merges to main.
name: Deploy Shinylive app to GitHub Pages

on:
  push:
    branches:
      - main
      - fable_shiny-webr-review-7ooa9h
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; don't cancel a deploy already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            cran::shiny
            cran::bslib
            cran::dplyr
            cran::readr
            cran::tidyr
            cran::stringr
            cran::ggplot2
            cran::scales
            cran::matrixStats
            cran::cachem
            cran::digest
            cran::testthat
            cran::withr
            cran::shinylive

      - name: Build data cache
        run: Rscript -e 'source("R/data_prep.R"); invisible(run_data_prep("."))'

      - name: Run test suite
        run: Rscript -e 'library(testthat); testthat::test_dir("tests/testthat", stop_on_failure = TRUE, reporter = "summary")'

      - name: Export Shinylive site
        run: Rscript tools/export_webr.R

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
