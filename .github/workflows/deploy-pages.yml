# Deploy the Lottery Odds Simulator as a static Shinylive (webR) site to
# GitHub Pages. The full test suite gates the export; the data cache is
# prebuilt so the browser never parses the raw CSVs.
#
# PUBLISHING MODEL: classic branch publishing — the built _site/ is force-
# pushed to the `gh-pages` branch as a single fresh commit per deploy, and
# GitHub Pages serves that branch (Settings → Pages → Deploy from a branch,
# which auto-configured when gh-pages was first pushed). WHY not the
# actions/deploy-pages artifact route: the repo's Pages site was created in
# branch mode and artifact deployments against it failed repeatedly in the
# Pages backend ("Deployment failed, try again later" during syncing_files);
# branch publishing needs only `contents: write` and no environment gates.
# The force push keeps gh-pages at exactly one commit, so the ~100 MB of
# generated wasm bundles never accumulate in git history.
name: Deploy Shinylive app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

# One deploy at a time; don't cancel one already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            cran::shiny
            cran::bslib
            cran::dplyr
            cran::readr
            cran::tidyr
            cran::stringr
            cran::ggplot2
            cran::scales
            cran::matrixStats
            cran::cachem
            cran::digest
            cran::testthat
            cran::withr
            cran::shinylive

      - name: Build data cache
        run: Rscript -e 'source("R/data_prep.R"); invisible(run_data_prep("."))'

      - name: Run test suite
        run: Rscript -e 'library(testthat); testthat::test_dir("tests/testthat", stop_on_failure = TRUE, reporter = "summary")'

      - name: Export Shinylive site
        run: Rscript tools/export_webr.R

      - name: Publish _site to the gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # .nojekyll: branch-published sites are Jekyll-processed by default,
          # which mangles paths and wastes build time on a 200-file wasm bundle.
          touch _site/.nojekyll
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy Shinylive site from ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
